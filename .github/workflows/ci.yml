name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Version consistency
        run: bash scripts/check-version.sh
      - name: gofmt
        run: bash scripts/gofmt-check.sh
      - name: Vet
        run: go vet ./...
      - name: Test + coverage floor
        run: bash scripts/coverage-check.sh
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            coverage.out
            coverage-summary.txt
          if-no-files-found: warn
      - name: Build
        run: |
          VER=$(tr -d '[:space:]' < VERSION)
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.ProjectVersion=${VER}" -o codeforge ./cmd/codeforge/
      - name: Binary size
        run: |
          SIZE=$(stat -c%s codeforge)
          echo "binary bytes=$SIZE"
          test "$SIZE" -lt 31457280
      - name: Version binary smoke
        run: |
          VER=$(tr -d '[:space:]' < VERSION)
          out=$(./codeforge version)
          echo "$out"
          echo "$out" | grep -q "$VER"
      - name: ACP fixtures (stdio + WebSocket)
        run: bash scripts/acp-fixture.sh

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Race detector (critical packages)
        run: bash scripts/test-race.sh

  dogfood-offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Offline dogfood suite
        env:
          DOGFOOD_LIVE: "0"
        run: bash scripts/dogfood-run.sh
      - name: Upload dogfood results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dogfood-offline
          path: |
            docs/dogfood/RESULTS.md
            docs/dogfood/results.json
          if-no-files-found: warn

  govulncheck:
    runs-on: ubuntu-latest
    continue-on-error: true # Q0.5 warn mode; set GOVULNCHECK_STRICT later
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: govulncheck
        run: bash scripts/govulncheck.sh
