name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Test
        run: go test ./...
      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o codeforge ./cmd/codeforge/
      - name: Binary size
        run: |
          SIZE=$(stat -c%s codeforge)
          echo "binary bytes=$SIZE"
          # soft budget 25MB (glamour/chroma); hard fail above 30MB
          test "$SIZE" -lt 31457280

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
