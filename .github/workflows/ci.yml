name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Version consistency
        run: bash scripts/check-version.sh
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build
        run: |
          VER=$(tr -d '[:space:]' < VERSION)
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.ProjectVersion=${VER}" -o codeforge ./cmd/codeforge/
      - name: Binary size
        run: |
          SIZE=$(stat -c%s codeforge)
          echo "binary bytes=$SIZE"
          test "$SIZE" -lt 31457280
      - name: Version binary smoke
        run: |
          VER=$(tr -d '[:space:]' < VERSION)
          out=$(./codeforge version)
          echo "$out"
          echo "$out" | grep -q "$VER"
