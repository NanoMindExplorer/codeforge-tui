name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Q8.6: pin actions to full commit SHAs
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.25.x"
      - name: Version consistency
        run: bash scripts/check-version.sh
      - name: gofmt
        run: bash scripts/gofmt-check.sh
      - name: Vet
        run: go vet ./...
      - name: Test + coverage floor
        run: bash scripts/coverage-check.sh
      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage
          path: |
            coverage.out
            coverage-summary.txt
          if-no-files-found: warn
      - name: Build
        run: |
          VER=$(tr -d '[:space:]' < VERSION)
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.ProjectVersion=${VER}" -o codeforge ./cmd/codeforge/
      - name: Binary size budget (Q7.3)
        run: bash scripts/binary-size.sh
      - name: Upload size report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: binary-size
          path: binary-size.txt
          if-no-files-found: warn
      - name: Version binary smoke
        run: |
          VER=$(tr -d '[:space:]' < VERSION)
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.ProjectVersion=${VER}" -o codeforge ./cmd/codeforge/
          out=$(./codeforge version)
          echo "$out"
          echo "$out" | grep -q "$VER"
      - name: ACP fixtures (stdio + WebSocket)
        run: bash scripts/acp-fixture.sh

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.25.x"
      - name: Race detector (critical packages)
        run: bash scripts/test-race.sh

  dogfood-offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.25.x"
      - name: Offline dogfood suite
        env:
          DOGFOOD_LIVE: "0"
        run: bash scripts/dogfood-run.sh
      - name: Upload dogfood results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: dogfood-offline
          path: |
            docs/dogfood/RESULTS.md
            docs/dogfood/results.json
          if-no-files-found: warn

  govulncheck:
    runs-on: ubuntu-latest
    continue-on-error: true # Q0.5 warn mode; set GOVULNCHECK_STRICT later
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.25.x"
      - name: govulncheck
        run: bash scripts/govulncheck.sh
